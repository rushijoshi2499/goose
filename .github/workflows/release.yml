name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and attach IPA to (e.g. v7.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-ipa:
    name: Build unsigned IPA
    runs-on: macos-latest
    outputs:
      ipa-name: ${{ steps.package.outputs.ipa-name }}
      ipa-size: ${{ steps.package.outputs.ipa-size }}
      tag: ${{ steps.resolve-tag.outputs.tag }}
    steps:
      - name: Resolve tag
        id: resolve-tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve-tag.outputs.tag }}
          fetch-depth: 0

      - name: Build (no code signing, use pre-built Rust libs)
        run: |
          xcodebuild \
            -project GooseSwift.xcodeproj \
            -scheme GooseSwift \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            GOOSE_SKIP_RUST_CORE_BUILD=1 \
            -derivedDataPath build/DerivedData \
            build

      - name: Package as IPA
        id: package
        run: |
          TAG="${{ steps.resolve-tag.outputs.tag }}"
          APP=$(find build/DerivedData/Build/Products -name "GooseSwift.app" | head -1)
          mkdir -p Payload
          cp -r "$APP" Payload/
          IPA_NAME="GooseSwift-${TAG}-unsigned.ipa"
          zip -r "$IPA_NAME" Payload/
          IPA_SIZE=$(stat -f%z "$IPA_NAME")
          echo "ipa-name=$IPA_NAME" >> "$GITHUB_OUTPUT"
          echo "ipa-size=$IPA_SIZE" >> "$GITHUB_OUTPUT"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: ${{ steps.package.outputs.ipa-name }}
          retention-days: 1

  release:
    name: Attach IPA to release and update AltStore source
    needs: build-ipa
    runs-on: ubuntu-latest
    steps:
      - name: Check out main (for altstore-source.json)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: ipa

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ needs.build-ipa.outputs.tag }}"
          PREV_TAG=$(git tag --sort=version:refname | grep "^v" | awk "/${TAG}/{found=1; next} found{print; exit}" | head -1)
          PREV_TAG_BEFORE=$(git tag --sort=version:refname | grep "^v" | awk "p==1{print; exit} /${TAG}/{p=1}" | head -1)

          if [ -n "$PREV_TAG_BEFORE" ]; then
            NOTES=$(git log "${PREV_TAG_BEFORE}..${TAG}" --pretty=format:"- %s" --no-merges)
          else
            NOTES=$(git log "${TAG}" --pretty=format:"- %s" --no-merges | head -30)
          fi

          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upsert release, attach IPA, and update AltStore source
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tag = `${{ needs.build-ipa.outputs.tag }}`;
            const notes = `${{ steps.notes.outputs.notes }}`;
            const ipaName = `${{ needs.build-ipa.outputs.ipa-name }}`;
            const ipaSize = parseInt(`${{ needs.build-ipa.outputs.ipa-size }}`);

            // 1. Get or create the GitHub Release
            let releaseId;
            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              releaseId = existing.data.id;
              core.info(`Using existing release ${releaseId} for ${tag}`);
            } catch (e) {
              if (e.status !== 404) throw e;
              const created = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: tag,
                body: notes || 'No changes listed.',
                draft: false,
                prerelease: false,
              });
              releaseId = created.data.id;
              core.info(`Created release ${releaseId} for ${tag}`);
            }

            // 2. Delete existing IPA asset if present (avoid duplicate)
            const assets = await github.rest.repos.listReleaseAssets({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
            });
            for (const asset of assets.data) {
              if (asset.name.endsWith('.ipa')) {
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: asset.id,
                });
                core.info(`Deleted old IPA asset: ${asset.name}`);
              }
            }

            // 3. Attach the unsigned IPA
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              name: ipaName,
              data: fs.readFileSync(ipaName),
            });
            core.info(`Uploaded ${ipaName}`);

            const ipaURL = `https://github.com/${context.repo.owner}/${context.repo.repo}/releases/download/${tag}/${ipaName}`;

            // 4. Update altstore-source.json
            const sourceFile = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'altstore-source.json',
              ref: 'main',
            });

            const source = JSON.parse(Buffer.from(sourceFile.data.content, 'base64').toString());
            const app = source.apps[0];

            const version = tag.replace(/^v/, '');
            const today = new Date().toISOString().split('T')[0];

            // Remove existing entry for this version if present
            app.versions = (app.versions || []).filter(v => v.version !== version);
            app.versions.unshift({
              version,
              date: today,
              localizedDescription: notes.split('\n').slice(0, 3).join('\n') || `Release ${tag}`,
              downloadURL: ipaURL,
              size: ipaSize,
            });
            // Keep sorted descending
            app.versions.sort((a, b) => b.version.localeCompare(a.version, undefined, { numeric: true }));

            await github.rest.repos.createOrUpdateFileContents({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'altstore-source.json',
              message: `chore(altstore): add ${tag} to source`,
              content: Buffer.from(JSON.stringify(source, null, 2) + '\n').toString('base64'),
              sha: sourceFile.data.sha,
            });

            core.info(`AltStore source updated with ${tag} → ${ipaURL}`);
