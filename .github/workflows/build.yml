name: Build Goose IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Rust core
        run: |
         source $HOME/.cargo/env
         cd Rust/core
         ls
         cargo build --release

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build Rust core
        run: |
          source $HOME/.cargo/env
          cargo build --release

      - name: Build iOS App
        run: |
          xcodebuild \
            -project GooseSwift.xcodeproj \
            -scheme GooseSwift \
            -sdk iphoneos \
            -configuration Release \
            clean build

      - name: Archive build output
        run: |
          mkdir output
          cp -R ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos/*.app output/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Goose-App
          path: output
